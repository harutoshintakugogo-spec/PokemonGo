name: Update official events and deploy
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch official Pokémon GO news
        id: fetch
        continue-on-error: true
        run: python scripts/update_events.py
      - name: Commit updated event data
        run: |
          git config user.name "go-event-log-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/status.json
          git diff --cached --quiet || git commit -m "chore: update official Pokémon GO events"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
